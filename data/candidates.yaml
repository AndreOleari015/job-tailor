# Companies worth checking, grouped by country so one file serves several
# markets. This is the input to the discovery command.
#
#   keywords     the vocabulary a posting has to hit to be worth reading
#   minMatching  how many of them, at minimum
#   companies    name + the country you would be applying in
#
# This is a seed list, not a curated one. Edit it: delete the companies you
# would never join, add the ones you would. Being wrong about a company here is
# harmless — the worst case is a posting you skim and dismiss.
#
# `country` is where you would be working, which for a remote-first company is
# usually its headquarters. A code absent from data/countries.yaml still works;
# it simply has no salary threshold and no authorisation statement.

keywords: [react native, typescript, node, mobile, full stack]
minMatching: 1

