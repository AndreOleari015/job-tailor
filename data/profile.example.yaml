# Example profile. Copy it to data/profile.yaml and replace every value with your own:
#
#   cp data/profile.example.yaml data/profile.yaml
#
# Every factual claim the tool can make about you lives in this file. The model
# selects bullets by `id` and never writes bullet text, so anything not written
# here cannot reach a CV or a cover letter.
#
# Rules that matter:
#   - Every bullet needs a stable, unique `id`. Ids are the model's only handle
#     on your history; renaming one invalidates saved applications.
#   - `tags` are free-form and drive phase-2 deterministic scoring.
#   - Write the bullet you would be happy to see printed. It is used verbatim.

